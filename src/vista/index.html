<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Energía - Aerotermia</title>
    <link rel="stylesheet" href="../../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Añadir nuevo elemento</h1>

                <form id="formEnergia">
                    <div class="row mb-4 border-bottom pb-3">
                        <div class="col-12">
                            <h2 class="text-primary">Máquina Aerotermia</h2>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="aero_kwh_total" class="form-label fw-bold">KWH TOTAL</label>
                            <input type="number" step="0.01" class="form-control" id="aero_kwh_total" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="aero_agua_kw" class="form-label fw-bold">AGUA KW</label>
                            <input type="number" step="0.01" class="form-control" id="aero_agua_kw" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="aero_calefaccion_kw" class="form-label fw-bold">CALEFACCIÓN KW</label>
                            <input type="number" step="0.01" class="form-control" id="aero_calefaccion_kw" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="aero_euros" class="form-label fw-bold">EUROS (€)</label>
                            <input type="number" step="0.01" class="form-control" id="aero_euros" placeholder="0.00">
                        </div>
                    </div>

                    <div class="row mb-4 border-bottom pb-3">
                        <div class="col-12">
                            <h2 class="text-primary">Inversor</h2>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="inv_vertida" class="form-label fw-bold">VERTIDA</label>
                            <input type="number" step="0.01" class="form-control" id="inv_vertida" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="inv_consumo_red" class="form-label fw-bold">CONSUMO RED</label>
                            <input type="number" step="0.01" class="form-control" id="inv_consumo_red" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="inv_consumo_total" class="form-label fw-bold">CONSUMO TOTAL</label>
                            <input type="number" step="0.01" class="form-control" id="inv_consumo_total" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="inv_solar" class="form-label fw-bold">SOLAR</label>
                            <input type="number" step="0.01" class="form-control" id="inv_solar" placeholder="0.00">
                        </div>
                    </div>

                    <div class="row mb-4 pb-3">
                        <div class="col-12">
                            <h2 class="text-primary">Compañía Eléctrica</h2>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_punta" class="form-label fw-bold">PUNTA</label>
                            <input type="number" step="0.01" class="form-control" id="elec_punta" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_llano" class="form-label fw-bold">LLANO</label>
                            <input type="number" step="0.01" class="form-control" id="elec_llano" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_valle" class="form-label fw-bold">VALLE</label>
                            <input type="number" step="0.01" class="form-control" id="elec_valle" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_euros" class="form-label fw-bold">EUROS (€)</label>
                            <input type="number" step="0.01" class="form-control" id="elec_euros" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_vertida" class="form-label fw-bold">VERTIDA</label>
                            <input type="number" step="0.01" class="form-control" id="elec_vertida" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_kwh_total" class="form-label fw-bold">KWH TOTAL</label>
                            <input type="number" step="0.01" class="form-control" id="elec_kwh_total" placeholder="0.00">
                        </div>
                    </div>

                    <div class="row mb-4 pb-3">
                        <div class="col-12">
                            <h2 class="text-primary">Variables</h2>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_punta" class="form-label fw-bold">PUNTA</label>
                            <input type="number" step="0.01" class="form-control" id="elec_punta" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_llano" class="form-label fw-bold">LLANO</label>
                            <input type="number" step="0.01" class="form-control" id="elec_llano" placeholder="0.00">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="elec_valle" class="form-label fw-bold">VALLE</label>
                            <input type="number" step="0.01" class="form-control" id="elec_valle" placeholder="0.00">
                        </div>
                        
                    </div>

                    <div class="row align-items-end">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_registro" class="form-label fw-bold">Fecha de Registro</label>
                            <input type="date" class="form-control" id="fecha_registro">
                        </div>
                        <div class="col-md-6 mb-3 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Enviar Datos</button>
                        </div>
                    </div>

                </form>

                <hr class="my-5">

                <div class="col-12">
                    <h1>Listar elementos por mes y año</h1>
                    <div id="listaElementos" class="mt-3">
                        <p class="text-muted">No hay elementos para mostrar.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
</body>

</html>
