<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Energía</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">Añadir nuevo elemento</h1>

        <form id="formEnergia">
            <h2 class="text-primary mt-4">Máquina Aerotermia</h2>
            <div class="row mb-3">
                <div class="col-md-6"><label>KWH TOTAL</label><input type="number" step="0.01" class="form-control" id="aero_kwh_total"></div>
                <div class="col-md-6"><label>AGUA KW</label><input type="number" step="0.01" class="form-control" id="aero_agua_kw"></div>
                <div class="col-md-6 mt-2"><label>CALEFACCIÓN KW</label><input type="number" step="0.01" class="form-control" id="aero_calefaccion_kw"></div>
                <div class="col-md-6 mt-2"><label>EUROS</label><input type="number" step="0.01" class="form-control" id="aero_euros"></div>
            </div>

            <h2 class="text-primary mt-4">Inversor</h2>
            <div class="row mb-3">
                <div class="col-md-6"><label>VERTIDA</label><input type="number" step="0.01" class="form-control" id="inv_vertida"></div>
                <div class="col-md-6"><label>CONSUMO RED</label><input type="number" step="0.01" class="form-control" id="inv_consumo_red"></div>
                <div class="col-md-6 mt-2"><label>CONSUMO TOTAL</label><input type="number" step="0.01" class="form-control" id="inv_consumo_total"></div>
                <div class="col-md-6 mt-2"><label>SOLAR</label><input type="number" step="0.01" class="form-control" id="inv_solar"></div>
            </div>

            <h2 class="text-primary mt-4">Compañía Eléctrica</h2>
            <div class="row mb-3">
                <div class="col-md-4"><label>PUNTA</label><input type="number" step="0.01" class="form-control" id="elec_punta"></div>
                <div class="col-md-4"><label>LLANO</label><input type="number" step="0.01" class="form-control" id="elec_llano"></div>
                <div class="col-md-4"><label>VALLE</label><input type="number" step="0.01" class="form-control" id="elec_valle"></div>
                <div class="col-md-4 mt-2"><label>EUROS</label><input type="number" step="0.01" class="form-control" id="elec_euros"></div>
                <div class="col-md-4 mt-2"><label>VERTIDA</label><input type="number" step="0.01" class="form-control" id="elec_vertida"></div>
                <div class="col-md-4 mt-2"><label>KWH TOTAL</label><input type="number" step="0.01" class="form-control" id="elec_kwh_total"></div>
            </div>

            <div class="row mt-4">
                <div class="col-md-6"><label>Fecha</label><input type="date" class="form-control" id="fecha_registro"></div>
                <div class="col-md-6 d-flex align-items-end"><button type="submit" class="btn btn-primary w-100 mt-3" id="btnEnviar">Enviar Datos</button></div>
            </div>
        </form>
        <div id="contenedor_resultados" style="display: none;">
            <h1 class="mb-4">Listar elementos</h1>
            <h3 class="text-primary mt-4 border-bottom pb-2">Máquina Aerotermia</h3>
            <div class="table-responsive mb-4">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>kWh Total</th>
                            <th>Agua (kW)</th>
                            <th>Calefacción (kW)</th>
                            <th>Euros (€)</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_aero"></tbody>
                </table>
            </div>

            <h3 class="text-primary mt-4 border-bottom pb-2">Inversor</h3>
            <div class="table-responsive mb-4">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Vertida</th>
                            <th>Consumo Red</th>
                            <th>Consumo Total</th>
                            <th>Solar</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_inv"></tbody>
                </table>
            </div>

            <h3 class="text-primary mt-4 border-bottom pb-2">Compañía Eléctrica</h3>
            <div class="table-responsive mb-4">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Punta</th>
                            <th>Llano</th>
                            <th>Valle</th>
                            <th>Euros (€)</th>
                            <th>Vertida</th>
                            <th>kWh Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_elec"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formEnergia').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita recargar la página

            // Recolectar datos
            const datos = {
                aeroKwhTotal: document.getElementById('aero_kwh_total').value || null,
                aeroAguaKw: document.getElementById('aero_agua_kw').value || null,
                aeroCalefaccionKw: document.getElementById('aero_calefaccion_kw').value || null,
                aeroEuros: document.getElementById('aero_euros').value || null,
                
                invVertida: document.getElementById('inv_vertida').value || null,
                invConsumoRed: document.getElementById('inv_consumo_red').value || null,
                invConsumoTotal: document.getElementById('inv_consumo_total').value || null,
                invSolar: document.getElementById('inv_solar').value || null,
                
                elecPunta: document.getElementById('elec_punta').value || null,
                elecLlano: document.getElementById('elec_llano').value || null,
                elecValle: document.getElementById('elec_valle').value || null,
                elecEuros: document.getElementById('elec_euros').value || null,
                elecVertida: document.getElementById('elec_vertida').value || null,
                elecKwhTotal: document.getElementById('elec_kwh_total').value || null,
                
                fechaRegistro: document.getElementById('fecha_registro').value || null
            };

            // Enviar a Spring Boot
            fetch('/api/energia/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(response => {
                if(response.ok) {
                    alert("¡Datos guardados correctamente en la base de datos!");
                    document.getElementById('formEnergia').reset(); // Limpia el formulario
                } else {
                    alert("Hubo un error al guardar los datos.");
                }
            })
            .catch(error => console.error('Error:', error));
        });
        // Lógica para buscar y listar elementos separados
        document.getElementById('btnBuscar').addEventListener('click', function() {
            const mes = document.getElementById('filtro_mes').value;
            const anio = document.getElementById('filtro_anio').value;

            fetch(`/api/energia/listar?mes=${mes}&anio=${anio}`)
                .then(response => response.json())
                .then(datos => {
                    const contenedorResultados = document.getElementById('contenedor_resultados');
                    const mensajeVacio = document.getElementById('mensaje_vacio');
                    
                    const tbodyAero = document.getElementById('tabla_aero');
                    const tbodyInv = document.getElementById('tabla_inv');
                    const tbodyElec = document.getElementById('tabla_elec');

                    // Limpiamos las tablas antes de llenarlas
                    tbodyAero.innerHTML = '';
                    tbodyInv.innerHTML = '';
                    tbodyElec.innerHTML = '';

                    // Si no hay datos, mostramos el mensaje y ocultamos las tablas
                    if (datos.length === 0) {
                        contenedorResultados.style.display = 'none';
                        mensajeVacio.style.display = 'block';
                        return;
                    }

                    // Si hay datos, mostramos las tablas y ocultamos el mensaje
                    contenedorResultados.style.display = 'block';
                    mensajeVacio.style.display = 'none';

                    // Recorremos los datos y llenamos las 3 tablas
                    datos.forEach(registro => {
                        const fecha = `<td class="fw-bold">${registro.fechaRegistro}</td>`;

                        // 1. Fila Aerotermia
                        tbodyAero.innerHTML += `<tr>
                            ${fecha}
                            <td>${registro.aeroKwhTotal || 0}</td>
                            <td>${registro.aeroAguaKw || 0}</td>
                            <td>${registro.aeroCalefaccionKw || 0}</td>
                            <td>${registro.aeroEuros || 0} €</td>
                        </tr>`;

                        // 2. Fila Inversor
                        tbodyInv.innerHTML += `<tr>
                            ${fecha}
                            <td>${registro.invVertida || 0}</td>
                            <td>${registro.invConsumoRed || 0}</td>
                            <td>${registro.invConsumoTotal || 0}</td>
                            <td>${registro.invSolar || 0}</td>
                        </tr>`;

                        // 3. Fila Compañía Eléctrica
                        tbodyElec.innerHTML += `<tr>
                            ${fecha}
                            <td>${registro.elecPunta || 0}</td>
                            <td>${registro.elecLlano || 0}</td>
                            <td>${registro.elecValle || 0}</td>
                            <td>${registro.elecEuros || 0} €</td>
                            <td>${registro.elecVertida || 0}</td>
                            <td>${registro.elecKwhTotal || 0}</td>
                        </tr>`;
                    });
                })
                .catch(error => {
                    console.error('Error al cargar los datos:', error);
                    alert("Hubo un error al intentar obtener los registros.");
                });
        });
    </script>
</body>
</html>
